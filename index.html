<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지구촌과 이주의 시대: 신대륙 발견</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #050a15; 
            color: #fff; 
            font-family: 'Noto Serif KR', serif;
            overflow: hidden; 
        }

        /* 배경: 고전풍 세계지도 */
        #map-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?q=80&w=2000&auto=format&fit=crop') center/cover;
            overflow: hidden;
        }

        /* 오버레이 효과 */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.2);
            pointer-events: none;
        }

        /* 항해하는 배 (이모지 대신 일러스트 느낌) */
        #ship {
            position: absolute;
            width: 80px;
            height: 80px;
            z-index: 10;
            transition: all 3s ease-in-out;
            filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.7));
            transform: translate(-50%, -50%);
            display: none;
        }

        /* 인터페이스 (글래스모피즘) */
        .ui-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 900px;
            background: rgba(20, 30, 48, 0.9);
            border: 2px solid #c5a059;
            border-radius: 15px;
            padding: 25px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .title-tag {
            color: #c5a059;
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .content-text {
            font-size: 1.25rem;
            line-height: 1.7;
            margin-bottom: 20px;
            min-height: 100px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        button {
            padding: 12px 20px;
            cursor: pointer;
            border: 1px solid #c5a059;
            background: transparent;
            color: #fff;
            border-radius: 5px;
            font-size: 1rem;
            transition: 0.3s;
        }

        button:hover {
            background: #c5a059;
            color: #000;
        }

        /* 인트로 화면 */
        #intro-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: radial-gradient(circle, #1a2a44 0%, #050a15 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .main-title { font-size: 3.5rem; color: #f1d38e; margin-bottom: 20px; text-shadow: 0 0 20px rgba(241,211,142,0.5); }

        /* 이동 경로 표시용 점선 (Canvas) */
        #path-canvas {
            position: absolute;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

<div id="intro-overlay">
    <h1 class="main-title">지구촌과 이주의 시대</h1>
    <p style="font-size: 1.2rem; margin-bottom: 40px; color: #aaa;">- 신대륙 발견과 세계의 변화 -</p>
    <div class="btn-group">
        <button onclick="toggleFullScreen()">전체화면</button>
        <button onclick="startVoyage()" style="background: #c5a059; color: #000; font-weight: bold;">항해 시작</button>
    </div>
</div>

<div id="map-container">
    <div class="overlay"></div>
    <canvas id="path-canvas"></canvas>
    <img id="ship" src="https://cdn-icons-png.flaticon.com/512/2040/2040003.png" alt="Ship">
    
    <div id="game-ui" class="ui-panel" style="display: none;">
        <span id="step-tag" class="title-tag">준비</span>
        <div id="content" class="content-text">선장님, 항해를 시작할 준비가 되셨습니까?</div>
        <div id="choices" class="btn-group"></div>
    </div>
</div>

<script>
    const ship = document.getElementById('ship');
    const canvas = document.getElementById('path-canvas');
    const ctx = canvas.getContext('2d');
    
    function toggleFullScreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    // 좌표 데이터 (화면 비율에 맞게 설정)
    const locations = {
        europe: { x: 48, y: 35 },
        africa: { x: 49, y: 55 },
        america_north: { x: 25, y: 40 },
        america_south: { x: 35, y: 75 }
    };

    function startVoyage() {
        document.getElementById('intro-overlay').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        moveShip(locations.europe.x, locations.europe.y);
        showStep('step1');
    }

    function moveShip(perX, perY) {
        const x = (window.innerWidth * perX) / 100;
        const y = (window.innerHeight * perY) / 100;
        ship.style.display = 'block';
        ship.style.left = x + 'px';
        ship.style.top = y + 'px';
    }

    const scenario = {
        'step1': {
            tag: "1. 이동 경로 및 방식 (1492년)",
            text: "우리는 유럽(스페인)에서 출발합니다. 당시 사람들은 지구가 평평하다고 믿었지만, 우리는 '지구 구형설'을 믿고 서쪽으로 향하려 합니다. 어떤 배를 이용할까요?",
            choices: [
                { text: "노를 젓는 갤리선", next: 'step1_fail' },
                { text: "바람을 이용하는 카라벨선", next: 'step2' }
            ]
        },
        'step1_fail': {
            tag: "항해 불가",
            text: "대서양의 거친 파도를 노 젓는 배로 건너기는 불가능합니다! 원거리 항해에 적합한 삼각형 돛을 가진 '카라벨선'과 나침반이 필요합니다.",
            choices: [{ text: "카라벨선으로 교체한다", next: 'step2' }]
        },
        'step2': {
            tag: "2. 이동 과정의 특징",
            text: "바다 한가운데서 몇 달을 보냈습니다. 식량이 썩고 전염병이 돕니다. 선원들이 '지구 끝의 낭떠러지'가 두렵다며 돌아가자고 합니다. 어떻게 할까요?",
            choices: [
                { text: "선원들을 달래며 계속 서쪽으로!", next: 'step3' },
                { text: "무서우니 일단 아프리카 쪽으로!", next: 'step2_sub' }
            ]
        },
        'step2_sub': {
            tag: "경로 변경",
            text: "아프리카 해안을 따라갔지만, 그곳은 이미 다른 나라가 선점했습니다. 우리는 다시 용기를 내어 대서양을 가로지르기로 합니다.",
            choices: [{ text: "대서양 횡단 시작", next: 'step3', action: () => moveShip(locations.america_north.x, locations.america_north.y) }]
        },
        'step3': {
            tag: "3. 이동 결과 - 신대륙 도착",
            text: "땅이다! 우리는 북아메리카 바하마 제도에 도착했습니다. 이곳을 인도로 착각해 원주민을 '인디언'이라 부르기 시작했죠. 이후 어떤 집단이 이주해오나요?",
            action: () => moveShip(locations.america_north.x, locations.america_north.y),
            choices: [
                { text: "황금을 찾는 정복자들", next: 'step4' },
                { text: "자유를 찾는 청교도들", next: 'step4' }
            ]
        },
        'step4': {
            tag: "4. 지구촌에 미친 영향 (긍정적)",
            text: "유럽과 아메리카 사이에 거대한 교류가 시작되었습니다. 아메리카에서 유럽으로 건너간 작물 중 인구 부양에 가장 큰 도움을 준 것은 무엇일까요?",
            choices: [
                { text: "옥수수와 감자", next: 'step5' },
                { text: "커피와 사탕수수", next: 'step4_sub' }
            ]
        },
        'step4_sub': {
            tag: "참고 지식",
            text: "커피와 사탕수수는 오히려 아메리카에 대규모 농장(플랜테이션)을 만들기 위해 유럽에서 가져온 것입니다. 유럽의 기아를 해결한 건 감자와 옥수수였습니다.",
            choices: [{ text: "아하! 확인했습니다.", next: 'step5' }]
        },
        'step5': {
            tag: "5. 지구촌에 미친 영향 (비극적)",
            text: "이주의 시대에는 어두운 면도 있습니다. 원주민들이 유럽에서 온 '이것' 때문에 90% 이상 사망했습니다. 무엇일까요?",
            choices: [
                { text: "유럽의 최신식 대포", next: 'step5_sub' },
                { text: "눈에 보이지 않는 천연두(균)", next: 'step6' }
            ]
        },
        'step5_sub': {
            tag: "역사적 사실",
            text: "전쟁보다 무서운 것은 면역력이 없던 원주민들에게 전파된 '천연두'와 같은 전염병이었습니다. 인구 급감으로 노동력이 부족해지자 아프리카 노예 이주라는 비극으로 이어졌죠.",
            choices: [{ text: "슬픈 역사군요...", next: 'step6' }]
        },
        'step6': {
            tag: "6. 결론: 이주의 결과",
            text: "신대륙 발견으로 대서양은 세계 무역의 중심이 되었고, 인종과 작물, 문화가 뒤섞인 오늘날의 '지구촌' 기틀이 마련되었습니다. 여러분은 이 이주가 인류에게 축복이라고 생각하시나요?",
            action: () => moveShip(locations.america_south.x, locations.america_south.y),
            choices: [
                { text: "발표를 마칩니다 (처음으로)", next: 'step1' }
            ]
        }
    };

    function showStep(stepId) {
        const step = scenario[stepId];
        document.getElementById('step-tag').innerText = step.tag;
        document.getElementById('content').innerText = step.text;
        
        const choicesDiv = document.getElementById('choices');
        choicesDiv.innerHTML = '';

        if (step.action) step.action();

        step.choices.forEach(c => {
            const btn = document.createElement('button');
            btn.innerText = c.text;
            btn.onclick = () => {
                if (stepId === 'step6') location.reload();
                else showNodeWithEffect(c.next);
            };
            choicesDiv.appendChild(btn);
        });
    }

    function showNodeWithEffect(nodeId) {
        const content = document.getElementById('content');
        content.style.opacity = 0;
        setTimeout(() => {
            showStep(nodeId);
            content.style.opacity = 1;
        }, 300);
    }
</script>

</body>
</html>
