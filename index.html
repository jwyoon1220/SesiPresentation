<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚓ 지구촌과 이주의 시대: 대항해시대</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Sans+KR:wght@300;400;700;900&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        :root {
            --gold: #c5a059;
            --bright-gold: #ffd700;
            --navy: #050a15;
            --dialog-bg: rgba(6, 12, 28, 0.97);
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            color: #f0f4f8;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            background-color: var(--navy);
        }

        /* ─── Background ─── */
        #bg-map {
            position: fixed; inset: 0;
            background:
                linear-gradient(rgba(5,10,21,.62), rgba(5,10,21,.74)),
                url('https://images.unsplash.com/photo-1524661135-423995f22d0b?q=80&w=2000&auto=format&fit=crop') center/cover no-repeat;
            z-index: 1;
        }
        #ocean-grid {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(100,160,210,.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(100,160,210,.04) 1px, transparent 1px);
            background-size: 64px 64px;
            z-index: 2; pointer-events: none;
        }

        /* ─── SVG route layer ─── */
        #route-svg {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            z-index: 3; pointer-events: none;
        }

        /* ─── Ship ─── */
        #player-ship {
            position: fixed; z-index: 10;
            font-size: 58px; line-height: 1;
            transform: translate(-50%, -50%);
            transition: left 3.2s cubic-bezier(.4,0,.2,1), top 3.2s cubic-bezier(.4,0,.2,1);
            animation: shipFloat 3.5s ease-in-out infinite;
            display: none;
            filter: drop-shadow(0 0 18px rgba(255,215,0,.55));
        }
        @keyframes shipFloat {
            0%,100% { transform: translate(-50%,-50%) rotate(-4deg) scale(1); }
            50%      { transform: translate(-50%,-53%) rotate(4deg) scale(1.05); }
        }

        /* ─── HUD ─── */
        #hud {
            position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
            width: 93%; max-width: 1200px;
            display: none; justify-content: space-between; align-items: center;
            background: rgba(4,9,22,.92);
            border: 1.5px solid var(--gold); border-radius: 12px;
            padding: 10px 22px; z-index: 100;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 24px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,215,0,.08);
        }
        .hud-group { display: flex; align-items: center; gap: 7px; }
        .hud-icon { font-size: 1.1rem; }
        .hud-label { font-size: .82rem; color: #7a8eaa; }
        .hud-val { font-size: 1.15rem; font-weight: 700; color: var(--bright-gold); transition: color .3s; }
        .hud-val.danger { color: #ff6644; }
        #pb-wrap {
            flex: 1; margin: 0 18px; height: 11px;
            background: rgba(255,255,255,.08); border-radius: 6px;
            border: 1px solid rgba(197,160,89,.3); overflow: hidden;
        }
        #pb-fill {
            height: 100%;
            background: linear-gradient(90deg, #c5a059, #ffd700);
            border-radius: 6px; transition: width .9s ease;
            box-shadow: 0 0 10px rgba(255,215,0,.45);
        }

        /* ─── Location tag ─── */
        #loc-tag {
            position: fixed; top: 76px; right: 18px;
            background: rgba(4,9,22,.88); border: 1px solid var(--gold);
            border-radius: 8px; padding: 7px 14px;
            font-size: .82rem; color: #9ab0cc;
            z-index: 100; display: none; backdrop-filter: blur(6px);
        }

        /* ─── Chapter banner ─── */
        #chapter-banner {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(.8);
            background: rgba(4,9,22,.96); border: 2px solid var(--gold);
            border-radius: 18px; padding: 28px 55px; text-align: center;
            z-index: 250; opacity: 0; pointer-events: none;
            transition: all .5s cubic-bezier(.34,1.56,.64,1);
        }
        #chapter-banner.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }
        #ch-label { font-size: .9rem; color: var(--gold); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; }
        #ch-text { font-size: 2rem; font-weight: 900; color: #fff; }

        /* ─── Milestone pop ─── */
        #milestone {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%,-50%) scale(.7);
            background: linear-gradient(135deg,#1a2a4a,#0d1728);
            border: 3px solid var(--bright-gold); border-radius: 20px;
            padding: 26px 48px; text-align: center;
            z-index: 240; opacity: 0; pointer-events: none;
            transition: all .45s cubic-bezier(.34,1.56,.64,1);
        }
        #milestone.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }
        #ms-label { font-size: 1rem; color: var(--gold); }
        #ms-text { font-size: 1.9rem; font-weight: 900; margin-top: 4px; }

        /* ─── Dialogue Box ─── */
        #dialogue-box {
            position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
            width: 93%; max-width: 1200px; min-height: 30vh;
            background: var(--dialog-bg); border: 2px solid var(--gold);
            border-radius: 16px; z-index: 100; display: none;
            box-shadow: 0 -6px 40px rgba(0,0,0,.9), 0 0 0 1px rgba(255,215,0,.04);
            backdrop-filter: blur(12px);
        }
        .dlg-inner { display: flex; min-height: 30vh; }

        /* portrait */
        #portrait-area {
            width: 118px; min-width: 118px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 18px 8px;
            border-right: 1px solid rgba(197,160,89,.18);
            background: rgba(0,0,0,.3); border-radius: 14px 0 0 14px;
        }
        #portrait-emoji { font-size: 50px; margin-bottom: 10px; animation: pPulse 2.2s ease-in-out infinite; }
        @keyframes pPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
        #portrait-name {
            font-size: .72rem; font-weight: 700;
            padding: 4px 9px; border-radius: 5px;
            text-align: center; color: #000;
            background: var(--gold); max-width: 102px;
            word-break: keep-all; line-height: 1.3;
        }

        /* text area */
        .dlg-text-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #dialogue-text {
            flex: 1; padding: 22px 28px 14px;
            font-family: 'Gowun Dodum', sans-serif;
            font-size: 1.3rem; line-height: 2;
            color: #e8eef5; overflow-y: auto;
        }
        #dialogue-text strong { color: var(--bright-gold); }
        #dialogue-text .hl-red { color: #ff8866; font-weight: 700; }
        #dialogue-text .hl-blue { color: #88aaff; font-weight: 700; }
        #dialogue-text .hl-green { color: #88ffaa; font-weight: 700; }

        /* choices */
        #choices-box {
            display: flex; flex-wrap: wrap; gap: 11px;
            padding: 13px 28px 18px;
            background: rgba(0,0,0,.42);
            border-top: 1px solid rgba(197,160,89,.18);
            border-radius: 0 0 14px 0;
        }
        .choice-btn {
            flex: 1; min-width: 210px; padding: 13px 18px;
            font-size: .97rem; font-weight: 700;
            font-family: 'Noto Sans KR', sans-serif;
            color: #ccddf5; background: rgba(25,45,75,.7);
            border: 1.5px solid rgba(197,160,89,.45); border-radius: 10px;
            cursor: pointer; transition: all .22s; text-align: center;
        }
        .choice-btn:hover:not(:disabled) {
            background: var(--gold); color: #000;
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(197,160,89,.4);
        }
        .choice-btn:disabled { cursor: default; opacity: .7; }
        .choice-btn.correct { background: #0d3d1e !important; border-color: #44ff88 !important; color: #88ffbb !important; }
        .choice-btn.wrong   { background: #3d0d0d !important; border-color: #ff4444 !important; color: #ffaaaa !important; }

        /* click hint */
        #click-hint {
            position: fixed; bottom: calc(30vh + 26px); right: 4.5%;
            font-size: .78rem; color: rgba(197,160,89,.55);
            z-index: 101; animation: blink 1.6s infinite; pointer-events: none;
        }
        @keyframes blink { 0%,100%{opacity:.55} 50%{opacity:.1} }

        /* ─── Quiz tag ─── */
        .q-tag {
            display: inline-block; background: #162040; color: #88aaff;
            border: 1px solid #3355aa; border-radius: 5px;
            padding: 3px 12px; font-size: .88rem;
            font-family: 'Noto Sans KR', sans-serif; margin-bottom: 10px;
        }

        /* ─── Title Screen ─── */
        #title-screen {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at 50% 40%, #0d1f42 0%, #030810 100%);
            z-index: 200; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 40px;
        }
        .t-ship { font-size: 96px; animation: tShip 3s ease-in-out infinite; margin-bottom: 14px; }
        @keyframes tShip {
            0%,100% { transform: translateY(0) rotate(-4deg); }
            50%      { transform: translateY(-18px) rotate(4deg); }
        }
        .t-waves { font-size: 36px; letter-spacing: 8px; opacity: .55; margin-bottom: 14px; }
        #t-main {
            font-size: 3.6rem; font-weight: 900; color: var(--bright-gold);
            text-shadow: 0 0 35px rgba(255,215,0,.45), 0 0 70px rgba(255,215,0,.2);
            margin-bottom: 10px; line-height: 1.2;
        }
        #t-sub  { font-size: 1.35rem; color: #7aa0cc; margin-bottom: 7px; }
        #t-cls  { font-size: .95rem; color: #4a607c; margin-bottom: 42px; }
        .t-badges { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; margin-bottom: 36px; }
        .t-badge {
            background: rgba(197,160,89,.12); border: 1px solid rgba(197,160,89,.38);
            border-radius: 30px; padding: 7px 18px; font-size: .88rem; color: var(--gold);
        }
        .start-btn {
            padding: 17px 52px; font-size: 1.35rem; font-weight: 900;
            background: linear-gradient(135deg, #c5a059, #ffd700); color: #000;
            border: none; border-radius: 12px; cursor: pointer;
            box-shadow: 0 0 32px rgba(255,215,0,.3), 0 4px 20px rgba(0,0,0,.6);
            transition: .25s; letter-spacing: 1px;
        }
        .start-btn:hover { transform: scale(1.06); box-shadow: 0 0 55px rgba(255,215,0,.5); }

        /* ─── Compass decoration ─── */
        #compass { position: fixed; bottom: calc(30vh + 55px); right: 26px; font-size: 68px; opacity: .3; z-index: 5; pointer-events: none; animation: spin 60s linear infinite; }
        @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }

        /* ─── Scrollbar ─── */
        #dialogue-text::-webkit-scrollbar { width: 5px; }
        #dialogue-text::-webkit-scrollbar-track { background: transparent; }
        #dialogue-text::-webkit-scrollbar-thumb { background: rgba(197,160,89,.4); border-radius: 3px; }

        @media (max-width: 768px) {
            #t-main { font-size: 2.4rem; }
            #dialogue-text { font-size: 1.1rem; }
            #portrait-area { width: 76px; min-width: 76px; }
            #portrait-emoji { font-size: 36px; }
        }
    </style>
</head>
<body>

<div id="bg-map"></div>
<div id="ocean-grid"></div>

<svg id="route-svg" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3.5" result="cb"/>
            <feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <marker id="arr-gold" markerWidth="7" markerHeight="7" refX="4" refY="3.5" orient="auto">
            <polygon points="0 0,7 3.5,0 7" fill="#ffd700" opacity=".85"/>
        </marker>
        <marker id="arr-red" markerWidth="7" markerHeight="7" refX="4" refY="3.5" orient="auto">
            <polygon points="0 0,7 3.5,0 7" fill="#ff6644" opacity=".85"/>
        </marker>
        <marker id="arr-blue" markerWidth="7" markerHeight="7" refX="4" refY="3.5" orient="auto">
            <polygon points="0 0,7 3.5,0 7" fill="#4499ff" opacity=".85"/>
        </marker>
        <marker id="arr-green" markerWidth="7" markerHeight="7" refX="4" refY="3.5" orient="auto">
            <polygon points="0 0,7 3.5,0 7" fill="#44ff88" opacity=".85"/>
        </marker>
    </defs>
</svg>

<div id="compass">🧭</div>
<div id="click-hint">▼ 클릭하면 즉시 표시</div>
<div id="player-ship">⛵</div>

<!-- Chapter banner -->
<div id="chapter-banner">
    <div id="ch-label">CHAPTER</div>
    <div id="ch-text"></div>
</div>

<!-- Milestone -->
<div id="milestone">
    <div id="ms-label">📍 도달!</div>
    <div id="ms-text"></div>
</div>

<!-- Title Screen -->
<div id="title-screen">
    <div class="t-ship">⛵</div>
    <div class="t-waves">🌊🌊🌊</div>
    <h1 id="t-main">지구촌과 이주의 시대</h1>
    <p id="t-sub">대항해시대: 신대륙 발견과 세계의 연결</p>
    <p id="t-cls">📚 세계시민 교육 · 고등학교 1학년</p>
    <div class="t-badges">
        <span class="t-badge">🗺️ 실시간 항로 추적</span>
        <span class="t-badge">📖 30+ 스토리 씬</span>
        <span class="t-badge">🎯 퀴즈 포함</span>
        <span class="t-badge">⚓ 인터랙티브</span>
        <span class="t-badge">🌍 세계시민 관점</span>
    </div>
    <button class="start-btn" onclick="startGame()">⚓ 항해 시작!</button>
</div>

<!-- HUD -->
<div id="hud">
    <div class="hud-group">
        <span class="hud-icon">🗺️</span>
        <span class="hud-label">진행</span>
        <div id="pb-wrap"><div id="pb-fill" style="width:0%"></div></div>
        <span class="hud-val" id="hv-progress">0%</span>
    </div>
    <div class="hud-group">
        <span class="hud-icon">⚓</span>
        <span class="hud-label">사기</span>
        <span class="hud-val" id="hv-morale">100</span>
    </div>
    <div class="hud-group">
        <span class="hud-icon">🍞</span>
        <span class="hud-label">식량</span>
        <span class="hud-val" id="hv-food">100</span>
    </div>
    <div class="hud-group">
        <span class="hud-icon">🎯</span>
        <span class="hud-label">퀴즈</span>
        <span class="hud-val" id="hv-quiz">0/0</span>
    </div>
</div>

<div id="loc-tag">📍 <span id="loc-text">이베리아 반도</span></div>

<!-- Dialogue -->
<div id="dialogue-box">
    <div class="dlg-inner">
        <div id="portrait-area">
            <div id="portrait-emoji">⚓</div>
            <div id="portrait-name">항해사</div>
        </div>
        <div class="dlg-text-area">
            <div id="dialogue-text"></div>
            <div id="choices-box"></div>
        </div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let currentScene = 'intro';
let typingInterval = null;
let isTyping = false;
let fullText = '';
let drawnRoutes = new Set();
let quizScore = 0, quizTotal = 0;
let stats = { progress: 0, morale: 100, food: 100 };

// ═══════════════════════════════════════════
//  SPEAKER CONFIG
// ═══════════════════════════════════════════
const SPEAKERS = {
    '항해사':           { emoji: '⚓', color: '#2a5a8a' },
    '시스템':           { emoji: '⚙️', color: '#445566' },
    '시스템 (개념)':    { emoji: '📚', color: '#4a2a7a' },
    '발표자':           { emoji: '🎤', color: '#1a6060' },
    '콜럼버스':         { emoji: '🗺️', color: '#7a5a10' },
    '바스쿠 다가마':    { emoji: '⛵', color: '#1a3a7a' },
    '마젤란':           { emoji: '🌍', color: '#1a5a30' },
    '원주민 족장':      { emoji: '🌿', color: '#1a5a2a' },
    '학자':             { emoji: '📖', color: '#5a2a7a' },
    '코르테스':         { emoji: '⚔️', color: '#7a1a10' },
    '몬테수마':         { emoji: '👑', color: '#7a4a08' },
    '노예 상인':        { emoji: '😈', color: '#4a0808' },
    '선원':             { emoji: '👨‍✈️', color: '#2a4a6a' },
    '현대인':           { emoji: '🌐', color: '#1a4a50' },
    '퀴즈 마스터':      { emoji: '🎯', color: '#5a2a00' },
};

// ═══════════════════════════════════════════
//  UI REFS
// ═══════════════════════════════════════════
const ui = {
    title:       document.getElementById('title-screen'),
    hud:         document.getElementById('hud'),
    ship:        document.getElementById('player-ship'),
    dlgBox:      document.getElementById('dialogue-box'),
    dlgText:     document.getElementById('dialogue-text'),
    choices:     document.getElementById('choices-box'),
    locTag:      document.getElementById('loc-tag'),
    locText:     document.getElementById('loc-text'),
    pEmoji:      document.getElementById('portrait-emoji'),
    pName:       document.getElementById('portrait-name'),
    pbFill:      document.getElementById('pb-fill'),
    hvProgress:  document.getElementById('hv-progress'),
    hvMorale:    document.getElementById('hv-morale'),
    hvFood:      document.getElementById('hv-food'),
    hvQuiz:      document.getElementById('hv-quiz'),
    routeSvg:    document.getElementById('route-svg'),
    chBanner:    document.getElementById('chapter-banner'),
    chText:      document.getElementById('ch-text'),
    milestone:   document.getElementById('milestone'),
    msText:      document.getElementById('ms-text'),
};

// ═══════════════════════════════════════════
//  GAME INIT
// ═══════════════════════════════════════════
function startGame() {
    ui.title.style.display = 'none';
    ui.hud.style.display = 'flex';
    ui.ship.style.display = 'block';
    ui.dlgBox.style.display = 'flex';
    ui.locTag.style.display = 'block';
    moveShip(75, 35, '이베리아 반도');
    loadScene('intro');
}

// ═══════════════════════════════════════════
//  SHIP & MAP
// ═══════════════════════════════════════════
function moveShip(xPct, yPct, loc) {
    ui.ship.style.left = xPct + '%';
    ui.ship.style.top  = yPct + '%';
    if (loc) ui.locText.innerText = loc;
}

function drawRoute(id, x1, y1, x2, y2, color, arrId, dashed) {
    if (drawnRoutes.has(id)) return;
    drawnRoutes.add(id);
    const W = window.innerWidth, H = window.innerHeight;
    const ax = (x1/100)*W, ay = (y1/100)*H;
    const bx = (x2/100)*W, by = (y2/100)*H;
    const cpx = (ax+bx)/2 + (by-ay)*0.28;
    const cpy = (ay+by)/2 - (bx-ax)*0.12;

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M${ax} ${ay} Q${cpx} ${cpy} ${bx} ${by}`);
    path.setAttribute('stroke', color || '#ffd700');
    path.setAttribute('stroke-width', '2.5');
    path.setAttribute('fill', 'none');
    path.setAttribute('opacity', '0.82');
    path.setAttribute('filter', 'url(#glow)');
    if (arrId) path.setAttribute('marker-end', `url(#arr-${arrId})`);
    if (dashed) path.setAttribute('stroke-dasharray', '9 6');
    ui.routeSvg.appendChild(path);

    // Animate draw
    try {
        const len = path.getTotalLength();
        path.style.strokeDasharray = len;
        path.style.strokeDashoffset = len;
        path.style.transition = 'stroke-dashoffset 2s ease';
        requestAnimationFrame(() => { path.style.strokeDashoffset = 0; });
    } catch(e) {
        // fallback: just show it
    }

    // Dot at destination
    setTimeout(() => {
        const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
        dot.setAttribute('cx', bx); dot.setAttribute('cy', by);
        dot.setAttribute('r', '5'); dot.setAttribute('fill', color || '#ffd700');
        dot.setAttribute('opacity', '0.9'); dot.setAttribute('filter', 'url(#glow)');
        ui.routeSvg.appendChild(dot);
    }, 2100);
}

// ═══════════════════════════════════════════
//  STATS
// ═══════════════════════════════════════════
function updateStats() {
    ui.pbFill.style.width = stats.progress + '%';
    ui.hvProgress.innerText = stats.progress + '%';
    ui.hvMorale.innerText   = stats.morale;
    ui.hvFood.innerText     = stats.food;
    ui.hvQuiz.innerText     = quizScore + '/' + quizTotal;
    ui.hvMorale.className   = 'hud-val' + (stats.morale < 40 ? ' danger' : '');
    ui.hvFood.className     = 'hud-val' + (stats.food   < 40 ? ' danger' : '');
}

function applyStats(ch) {
    if (!ch) return;
    if (ch.p) stats.progress = Math.min(100, stats.progress + ch.p);
    if (ch.m) stats.morale   = Math.max(0, Math.min(100, stats.morale + ch.m));
    if (ch.f) stats.food     = Math.max(0, Math.min(100, stats.food   + ch.f));
    updateStats();
}

// ═══════════════════════════════════════════
//  TYPING EFFECT
// ═══════════════════════════════════════════
function typeText(text, done) {
    clearInterval(typingInterval);
    isTyping = true;
    fullText = text;
    ui.dlgText.innerHTML = '';
    let i = 0;
    typingInterval = setInterval(() => {
        if (i >= text.length) {
            clearInterval(typingInterval);
            isTyping = false;
            if (done) done();
            return;
        }
        if (text[i] === '<') {
            let tag = '';
            while (i < text.length && text[i] !== '>') { tag += text[i++]; }
            tag += '>'; i++;
            ui.dlgText.innerHTML += tag;
        } else {
            ui.dlgText.innerHTML += text[i++];
        }
        ui.dlgText.scrollTop = ui.dlgText.scrollHeight;
    }, 20);
}

ui.dlgBox.addEventListener('click', e => {
    if (isTyping && !e.target.classList.contains('choice-btn')) {
        clearInterval(typingInterval);
        ui.dlgText.innerHTML = fullText;
        ui.dlgText.scrollTop = ui.dlgText.scrollHeight;
        isTyping = false;
        const scene = scenes[currentScene];
        if (scene && scene.choices) showChoices(scene.choices);
    }
});

// ═══════════════════════════════════════════
//  SCENE MANAGEMENT
// ═══════════════════════════════════════════
function loadScene(id) {
    currentScene = id;
    const scene = scenes[id];
    if (!scene) { console.error('Missing scene:', id); return; }

    ui.choices.innerHTML = '';

    // Speaker portrait
    const spk = SPEAKERS[scene.speaker] || SPEAKERS['시스템'];
    ui.pEmoji.innerText = spk.emoji;
    ui.pName.innerText  = scene.speaker;
    ui.pName.style.background = spk.color;

    if (scene.action) scene.action();
    typeText(scene.text, () => { if (scene.choices) showChoices(scene.choices); });
}

function showChoices(choices) {
    ui.choices.innerHTML = '';
    choices.forEach((ch, idx) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerHTML = ch.text;
        btn.onclick = e => {
            e.stopPropagation();
            if (ch.isQuiz) { handleQuiz(idx, choices); return; }
            applyStats(ch.s);
            if (ch.next) loadScene(ch.next);
        };
        ui.choices.appendChild(btn);
    });
}

function handleQuiz(selIdx, choices) {
    quizTotal++;
    const btns = Array.from(ui.choices.querySelectorAll('.choice-btn'));
    btns.forEach(b => b.disabled = true);
    const sel = choices[selIdx];

    if (sel.correct) {
        btns[selIdx].classList.add('correct');
        btns[selIdx].innerHTML += ' ✅';
        quizScore++;
        applyStats({ m: 10 });
    } else {
        btns[selIdx].classList.add('wrong');
        btns[selIdx].innerHTML += ' ❌';
        applyStats({ m: -5 });
    }
    choices.forEach((c, i) => { if (c.correct) { btns[i].classList.add('correct'); btns[i].innerHTML += ' ✅ (정답)'; }});
    updateStats();

    // All quiz choices share same next scene; pick from first non-null
    const nextId = choices.find(c => c.next) && choices.find(c => c.next).next;
    if (nextId) setTimeout(() => loadScene(nextId), 1700);
}

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
function showChapter(text) {
    ui.chText.innerText = text;
    ui.chBanner.classList.add('show');
    setTimeout(() => ui.chBanner.classList.remove('show'), 2200);
}
function showMilestone(text) {
    ui.msText.innerText = text;
    ui.milestone.classList.add('show');
    setTimeout(() => ui.milestone.classList.remove('show'), 2400);
}
function resetGame() {
    stats = { progress: 0, morale: 100, food: 100 };
    quizScore = 0; quizTotal = 0;
    drawnRoutes.clear();
    ui.routeSvg.querySelectorAll('path, circle').forEach(n => n.remove());
    moveShip(75, 35, '이베리아 반도');
    updateStats();
}
