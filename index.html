<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지구촌과 이주의 시대 (통합사회 발표)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700;900&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #040914;
            color: #ffffff;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* 고급스러운 바다/지도 배경 (외부 고화질 지도 이미지 링크 사용 - AI 생성 아님) */
        #background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(4, 9, 20, 0.8), rgba(4, 9, 20, 0.9)), 
                        url('https://images.unsplash.com/photo-1524661135-423995f22d0b?q=80&w=2000&auto=format&fit=crop') center/cover;
            z-index: 1;
            filter: contrast(1.2) sepia(0.2);
        }

        /* 유저가 제공한 배 이미지 */
        #main-ship {
            position: absolute;
            width: 200px;
            z-index: 10;
            transition: all 2s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.8));
            transform: translate(-50%, -50%);
            cursor: pointer;
        }

        #main-ship:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }

        /* 발표 UI 패널 */
        .ui-panel {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85vw;
            max-width: 1400px;
            height: 80vh;
            background: rgba(12, 20, 35, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            z-index: 100;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9);
            display: none;
            overflow: hidden;
        }

        /* 상단 헤더 */
        .header {
            padding: 30px 50px;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 2px solid rgba(255, 215, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .step-title {
            color: #ffd700;
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 2px;
        }

        /* 메인 콘텐츠 영역 (2단 분리: 슬라이드 요약 + 상세 해설) */
        .content-area {
            display: flex;
            flex: 1;
            padding: 40px 50px;
            gap: 50px;
        }

        /* 왼쪽: PPT 슬라이드 같은 핵심 내용 */
        .slide-core {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .main-heading {
            font-size: 3rem;
            line-height: 1.4;
            margin-bottom: 30px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
        }

        .bullet-points {
            font-size: 1.3rem;
            line-height: 2;
            color: #b0c4de;
        }

        .bullet-points li {
            margin-bottom: 15px;
            margin-left: 25px;
        }

        /* 오른쪽: 대본/상세 설명 박스 */
        .detail-box {
            flex: 0.8;
            background: rgba(0, 0, 0, 0.5);
            border-left: 5px solid #ffd700;
            border-radius: 15px;
            padding: 35px;
            overflow-y: auto;
        }

        .detail-box h3 {
            color: #ffd700;
            margin-bottom: 20px;
            font-size: 1.4rem;
        }

        .detail-text {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #e2e8f0;
        }

        /* 하단 컨트롤러 */
        .controls {
            padding: 25px 50px;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #040914;
            background: #ffd700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.7);
        }

        /* 인트로 스크린 */
        #intro-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            background: rgba(4, 9, 20, 0.9);
            text-align: center;
        }
        
        #intro-screen h1 { font-size: 4.5rem; color: #ffd700; margin-bottom: 20px; text-shadow: 0 0 30px rgba(255,215,0,0.5); }
        #intro-screen p { font-size: 1.5rem; color: #ccc; margin-bottom: 50px; }

        .ship-path {
            position: absolute;
            top:0; left:0; width:100%; height:100%;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

<div id="background"></div>
<canvas id="path-canvas" class="ship-path"></canvas>

<div id="intro-screen">
    <h1>지구촌과 이주의 시대</h1>
    <p>고1 통합사회 발표 | 신대륙 발견과 그 거대한 영향</p>
    <button onclick="startPresentation()">발표 시작 (항해 출항)</button>
</div>

<img id="main-ship" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSh4KWCsmMZhyen5XbgZc78UxsqTM4I0mKlng&s" alt="항해선" style="display: none;">

<div id="ui-panel" class="ui-panel">
    <div class="header">
        <div id="step-title" class="step-title">목차 1</div>
        <div id="step-counter" style="color: #ccc; font-size: 1.2rem;">1 / 6</div>
    </div>
    
    <div class="content-area">
        <div class="slide-core">
            <h2 id="main-heading" class="main-heading">핵심 제목</h2>
            <ul id="bullet-points" class="bullet-points">
                </ul>
        </div>
        
        <div class="detail-box">
            <h3>📖 상세 해설 (스크립트)</h3>
            <div id="detail-text" class="detail-text">
                여기에 상세한 해설이 들어갑니다.
            </div>
        </div>
    </div>
    
    <div class="controls">
        <span style="color: #666;">배를 클릭하거나 버튼을 눌러 이동하세요</span>
        <div style="display: flex; gap: 20px;">
            <button onclick="prevStep()" id="prev-btn" style="background: transparent; color: #ffd700; border: 1px solid #ffd700;">이전</button>
            <button onclick="nextStep()" id="next-btn">다음 (항해 계속)</button>
        </div>
    </div>
</div>

<script>
    const ship = document.getElementById('main-ship');
    const introScreen = document.getElementById('intro-screen');
    const uiPanel = document.getElementById('ui-panel');
    
    // UI 요소들
    const stepTitle = document.getElementById('step-title');
    const mainHeading = document.getElementById('main-heading');
    const bulletPoints = document.getElementById('bullet-points');
    const detailText = document.getElementById('detail-text');
    const stepCounter = document.getElementById('step-counter');
    
    let currentStep = 0;

    // 발표 시나리오 데이터 (20분 분량의 흐름을 6단계로 정리)
    const presentationData = [
        {
            title: "도입: 왜 바다로 나갔는가?",
            heading: "신항로 개척의 배경과 과학의 발전",
            bullets: [
                "동방에 대한 호기심 (마르코 폴로의 동방견문록)",
                "경제적 동기: 오스만 제국의 지중해 장악과 향신료(후추) 가격 폭등",
                "항해 기술의 발전: 나침반 도입, 카라벨 선(삼각돛) 발명, 지도 제작 기술 발달",
                "국가적 지원: 에스파냐와 포르투갈의 왕실 후원"
            ],
            detail: "당시 유럽인들에게 후추는 고기를 보존하고 맛을 내는 필수품이자 금과 맞먹는 사치품이었습니다. 오스만 제국을 거치지 않고 직접 아시아로 가기 위해, 그들은 '과학기술'을 무기 삼아 목숨을 걸고 바다로 나갔습니다.",
            x: 55, y: 35 // 유럽/포르투갈 위치 쯤
        },
        {
            title: "1. 이동 경로 및 방식",
            heading: "동쪽으로, 혹은 서쪽으로",
            bullets: [
                "포르투갈의 동쪽 항로: 바스쿠 다가마, 희망봉을 돌아 인도에 도착",
                "에스파냐의 서쪽 항로: 콜럼버스, 지구 구형설을 믿고 서쪽으로 향해 아메리카 도달",
                "마젤란 일행의 세계 일주: 최초로 태평양 횡단, 지구가 둥글다는 것을 직접 증명"
            ],
            detail: "지구가 평평하다고 믿었던 시절, 콜럼버스는 서쪽으로 가면 인도가 나올 것이라 확신했습니다. 비록 그가 도착한 곳은 인도가 아닌 아메리카였지만, 이 항해는 세계의 지도를 완전히 바꾸어 놓았습니다.",
            x: 35, y: 45 // 대서양 횡단 중
        },
        {
            title: "2. 이동 집단",
            heading: "바다를 건넌 사람들: 정복자부터 노예까지",
            bullets: [
                "정복자 (콘키스타도르): 황금과 은을 노리고 온 에스파냐 군인들 (아스텍, 잉카 멸망)",
                "선교사: 가톨릭 교리를 전파하기 위해 이주",
                "정착민: 17세기 이후 종교적 탄압(청교도)이나 가난을 피해 온 유럽인들",
                "강제 이주민: 플랜테이션 노동을 위해 끌려온 수천만 명의 아프리카 노예들"
            ],
            detail: "처음에는 일확천금을 꿈꾸는 모험가들이 이주했습니다. 하지만 식민지가 개척되면서 원주민의 노동력이 부족해지자, 아프리카인들을 무자비하게 사냥하여 강제로 이주시켰습니다. 자발적 이주와 강제 이주가 혼재된 시대였습니다.",
            x: 25, y: 40 // 북/중미 대륙
        },
        {
            title: "3. 이동 과정의 특성",
            heading: "가혹한 바다와 삼각 무역의 비극",
            bullets: [
                "가혹한 환경: 괴혈병, 영양실조, 전염병으로 선원들의 높은 사망률",
                "삼각 무역 체제: 유럽 ↔ 아프리카 ↔ 아메리카를 잇는 잔혹한 무역망",
                "중간 항로(Middle Passage)의 참상: 노예선 밑바닥의 비인간적 환경"
            ],
            detail: "무역의 구조는 철저히 유럽의 이익에 맞춰졌습니다. 유럽의 총과 면직물은 아프리카의 노예와 교환되었고, 이 노예들은 아메리카의 광산과 농장에서 일했습니다. 그곳에서 생산된 설탕과 은이 다시 유럽으로 흘러가는 끔찍한 '삼각 무역'이 완성되었습니다.",
            x: 40, y: 55 // 대서양 중앙 (삼각무역 경로)
        },
        {
            title: "4. 이동 결과 (지구촌에 미친 영향)",
            heading: "콜럼버스의 교환과 가격 혁명",
            bullets: [
                "[긍정] 작물의 교환: 감자, 옥수수(아메리카) 전래로 유럽 기아 해결 및 인구 증가",
                "[경제] 가격 혁명: 막대한 은의 유입으로 유럽 물가 폭등 → 상업 혁명, 자본주의 발달",
                "[부정] 생태계 파괴와 질병: 면역력 없는 원주민들에게 천연두, 홍역 전염 → 인구 90% 급감",
                "[문화] 문화의 파괴와 융합: 원주민 고유 문명 파괴, 새로운 혼혈 문화 형성"
            ],
            detail: "콜럼버스의 교환은 인류 역사상 가장 거대한 생태학적 사건입니다. 감자는 유럽을 먹여 살렸지만, 유럽인들이 묻혀 온 눈에 보이지 않는 균(천연두)은 아메리카 원주민 대륙을 죽음으로 몰아넣었습니다.",
            x: 50, y: 40 // 유럽으로 은과 작물이 돌아오는 경로
        },
        {
            title: "결론",
            heading: "현대 지구촌의 뼈대를 세우다",
            bullets: [
                "단절된 대륙들의 연결: 아메리카 대륙이 세계사에 편입됨",
                "유럽 중심의 세계 질서 형성 시작",
                "오늘날의 글로벌 무역망, 인종 다양성, 문화 융합의 근원",
                "이주의 역사가 남긴 빛과 그림자를 통한 교훈"
            ],
            detail: "이주의 시대는 많은 피와 눈물을 동반했습니다. 하지만 경제, 생태, 인종이 뒤섞이는 거대한 용광로 같은 이 시기가 없었다면, 우리가 지금 살고 있는 촘촘하게 연결된 '지구촌'은 존재하지 않았을 것입니다. 이상으로 발표를 마칩니다.",
            x: 50, y: 50 // 화면 중앙
        }
    ];

    function startPresentation() {
        introScreen.style.display = 'none';
        uiPanel.style.display = 'flex';
        ship.style.display = 'block';
        updateUI();
    }

    function updateUI() {
        const data = presentationData[currentStep];
        
        // 데이터 주입
        stepTitle.innerText = data.title;
        mainHeading.innerText = data.heading;
        detailText.innerText = data.detail;
        stepCounter.innerText = `${currentStep + 1} / ${presentationData.length}`;
        
        // 불릿 포인트 생성
        bulletPoints.innerHTML = '';
        data.bullets.forEach(point => {
            const li = document.createElement('li');
            li.innerText = point;
            bulletPoints.appendChild(li);
        });

        // 배 이동 애니메이션
        const pxX = (window.innerWidth * data.x) / 100;
        const pxY = (window.innerHeight * data.y) / 100;
        ship.style.left = pxX + 'px';
        ship.style.top = pxY + 'px';

        // 버튼 상태
        document.getElementById('prev-btn').style.visibility = currentStep === 0 ? 'hidden' : 'visible';
        document.getElementById('next-btn').innerText = currentStep === presentationData.length - 1 ? "발표 종료" : "다음 (항해 계속)";
    }

    function nextStep() {
        if (currentStep < presentationData.length - 1) {
            currentStep++;
            uiPanel.style.opacity = 0; // 페이드 효과
            setTimeout(() => {
                updateUI();
                uiPanel.style.opacity = 1;
            }, 300);
        } else {
            alert("발표가 모두 끝났습니다. 수고하셨습니다!");
        }
    }

    function prevStep() {
        if (currentStep > 0) {
            currentStep--;
            uiPanel.style.opacity = 0;
            setTimeout(() => {
                updateUI();
                uiPanel.style.opacity = 1;
            }, 300);
        }
    }

    // 배 클릭 시에도 다음 단계로 넘어가게
    ship.addEventListener('click', nextStep);

</script>
</body>
</html>
