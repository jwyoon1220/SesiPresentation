<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대항해시대</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Sans+KR:wght@400;700;900&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: radial-gradient(circle at 50% 50%, #1a2a44 0%, #050a15 100%);
            color: #fff;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* 바다 및 지도 그리드 효과 (CSS만 사용) */
        .ocean-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 80px 80px;
            z-index: 1;
        }

        /* 게임 상단 HUD (상태창) */
        .hud-top {
            position: absolute;
            top: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 1200px;
            display: flex; justify-content: space-between;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #c5a059;
            border-radius: 10px;
            padding: 15px 30px;
            z-index: 100;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .stat-item {
            font-size: 1.2rem; font-weight: bold; color: #e2e8f0;
            display: flex; align-items: center; gap: 10px;
        }

        .stat-value { color: #ffd700; font-size: 1.5rem; }

        /* 플레이어의 배 (유저 요청 이미지) */
        #player-ship {
            position: absolute;
            width: 160px;
            z-index: 10;
            transition: all 2.5s ease-in-out;
            filter: drop-shadow(0 20px 20px rgba(0,0,0,0.8));
            transform: translate(-50%, -50%);
            display: none;
        }

        /* 게임 하단 대화/텍스트 박스 */
        .dialogue-box {
            position: absolute;
            bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 1200px;
            height: 30vh;
            background: rgba(15, 23, 42, 0.9);
            border: 3px solid #c5a059;
            border-radius: 15px;
            display: flex; flex-direction: column;
            z-index: 100;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
            display: none;
        }

        .speaker-name {
            position: absolute;
            top: -20px; left: 30px;
            background: #c5a059; color: #000;
            padding: 5px 20px; border-radius: 5px;
            font-weight: 900; font-size: 1.2rem;
            box-shadow: 0 5px 10px rgba(0,0,0,0.5);
        }

        .dialogue-content {
            flex: 1; padding: 40px;
            font-family: 'Gowun Dodum', sans-serif;
            font-size: 1.5rem; line-height: 1.8; color: #f8fafc;
            overflow-y: auto;
        }

        /* 선택지 버튼 영역 */
        .choices-container {
            display: flex; justify-content: center; gap: 15px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-top: 1px solid rgba(197, 160, 89, 0.3);
        }

        .choice-btn {
            padding: 12px 25px;
            font-size: 1.1rem; font-weight: bold;
            color: #fff; background: transparent;
            border: 2px solid #c5a059; border-radius: 8px;
            cursor: pointer; transition: 0.3s;
            flex: 1; max-width: 350px; text-align: center;
        }

        .choice-btn:hover {
            background: #c5a059; color: #000;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(197, 160, 89, 0.5);
        }

        /* 타이틀 화면 */
        #title-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(5, 10, 21, 0.95); z-index: 200; text-align: center;
        }

        #title-screen h1 { font-size: 4rem; color: #ffd700; text-shadow: 0 0 20px rgba(255,215,0,0.5); margin-bottom: 20px; }
        #title-screen p { font-size: 1.5rem; color: #a8b2d1; margin-bottom: 50px; }
        
        .start-btn {
            padding: 20px 50px; font-size: 1.5rem; font-weight: 900;
            background: #ffd700; color: #000; border: none; border-radius: 10px;
            cursor: pointer; box-shadow: 0 0 20px rgba(255,215,0,0.4); transition: 0.3s;
        }
        .start-btn:hover { transform: scale(1.05); }

    </style>
</head>
<body>

<div class="ocean-grid"></div>

<div id="title-screen">
    <h1>⚓ 지구촌과 이주의 시대</h1>

    <button class="start-btn" onclick="startGame()">게임 시작</button>
</div>

<div class="hud-top" id="hud" style="display: none;">
    <div class="stat-item">진행도: <span class="stat-value" id="progress-val">0%</span></div>
    <div class="stat-item">항해 사기: <span class="stat-value" id="morale-val">100</span></div>
    <div class="stat-item">식량 보급: <span class="stat-value" id="food-val">100</span></div>
</div>

<img id="player-ship" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSh4KWCsmMZhyen5XbgZc78UxsqTM4I0mKlng&s" alt="플레이어 배">

<div class="dialogue-box" id="dialogue-box">
    <div class="speaker-name" id="speaker-name">시스템</div>
    <div class="dialogue-content" id="dialogue-text"></div>
    <div class="choices-container" id="choices-box"></div>
</div>

<script>
    // 상태 변수
    let currentScene = 'intro';
    let typingInterval;
    let isTyping = false;
    let fullText = "";

    const ui = {
        title: document.getElementById('title-screen'),
        hud: document.getElementById('hud'),
        ship: document.getElementById('player-ship'),
        dialogueBox: document.getElementById('dialogue-box'),
        speaker: document.getElementById('speaker-name'),
        text: document.getElementById('dialogue-text'),
        choices: document.getElementById('choices-box'),
        progress: document.getElementById('progress-val'),
        morale: document.getElementById('morale-val'),
        food: document.getElementById('food-val')
    };

    // 게임 시작 함수
    function startGame() {
        ui.title.style.display = 'none';
        ui.hud.style.display = 'flex';
        ui.ship.style.display = 'block';
        ui.dialogueBox.style.display = 'flex';
        
        // 배 초기 위치 설정 (화면 오른쪽/유럽 부근 느낌)
        moveShip(70, 40);
        loadScene('intro');
    }

    // 배 이동 함수 (비율 %)
    function moveShip(x, y) {
        ui.ship.style.left = `${x}%`;
        ui.ship.style.top = `${y}%`;
    }

    // 상태 업데이트 함수
    function updateStats(progress, morale, food) {
        ui.progress.innerText = progress + '%';
        ui.morale.innerText = morale;
        ui.food.innerText = food;
        if(morale < 50) ui.morale.style.color = '#ff4444';
        if(food < 50) ui.food.style.color = '#ff4444';
    }

    // 타이핑 효과
    function typeText(text, callback) {
        clearInterval(typingInterval);
        isTyping = true;
        fullText = text;
        ui.text.innerHTML = "";
        let i = 0;
        
        typingInterval = setInterval(() => {
            if (i < text.length) {
                // <br> 태그 처리
                if(text.charAt(i) === '<') {
                    let tag = "";
                    while(text.charAt(i) !== '>') { tag += text.charAt(i); i++; }
                    tag += '>';
                    ui.text.innerHTML += tag;
                } else {
                    ui.text.innerHTML += text.charAt(i);
                }
                i++;
                ui.text.scrollTop = ui.text.scrollHeight; // 자동 스크롤
            } else {
                clearInterval(typingInterval);
                isTyping = false;
                if(callback) callback();
            }
        }, 30); // 타이핑 속도
    }

    // 대화창 클릭 시 스킵
    ui.dialogueBox.addEventListener('click', (e) => {
        if(isTyping && !e.target.classList.contains('choice-btn')) {
            clearInterval(typingInterval);
            ui.text.innerHTML = fullText;
            isTyping = false;
            showChoices(scenes[currentScene].choices);
        }
    });

    // 씬 로드 함수
    function loadScene(sceneId) {
        currentScene = sceneId;
        const scene = scenes[sceneId];
        
        ui.choices.innerHTML = ""; // 이전 선택지 삭제
        ui.speaker.innerText = scene.speaker;
        
        if(scene.action) scene.action(); // 특정 씬에 배 이동이나 스탯 변경 적용
        
        typeText(scene.text, () => {
            showChoices(scene.choices);
        });
    }

    function showChoices(choices) {
        ui.choices.innerHTML = "";
        choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = choice.text;
            btn.onclick = (e) => {
                e.stopPropagation();
                if(choice.next) loadScene(choice.next);
            };
            ui.choices.appendChild(btn);
        });
    }

    // -----------------------------------------------------------
    // 📖 게임 시나리오 데이터 (발표 20분용 분량)
    // -----------------------------------------------------------
    const scenes = {
        'intro': {
            speaker: '항해사',
            text: "선장님, 바야흐로 15세기 말입니다. 오스만 제국이 지중해를 장악하여 동방의 향신료(후추) 가격이 금값이 되었습니다. 우리에게는 두 가지 선택이 있습니다. 어떻게 할까요?",
            action: () => updateStats(5, 100, 100),
            choices: [
                { text: "안전하게 아프리카를 돌아 인도로 가자 (포르투갈 방식)", next: 'route_east' },
                { text: "지구는 둥글다! 과감하게 대서양을 횡단하자 (에스파냐 방식)", next: 'route_west' }
            ]
        },
        'route_east': {
            speaker: '항해사',
            text: "아프리카 희망봉을 도는 루트군요! 바스쿠 다가마의 길입니다. 하지만 이번 발표의 핵심 주제는 '신대륙'입니다. 선장님, 과감하게 서쪽으로 뱃머리를 돌리는 것이 어떨까요?",
            choices: [
                { text: "알겠다. 목적지를 서쪽으로 변경한다!", next: 'route_west' }
            ]
        },
        'route_west': {
            speaker: '시스템 (개념 설명)',
            text: "[이동 경로 및 방식]<br><br>과거에는 갤리선(노를 젓는 배)을 탔지만, 이제 우리는 나침반과 삼각돛을 장착한 '카라벨 선'을 탑니다. 이것이 대서양의 험한 역풍을 뚫고 이동할 수 있었던 과학 기술적 배경입니다. 서쪽으로 출항합니다!",
            action: () => { moveShip(50, 50); updateStats(20, 90, 80); },
            choices: [
                { text: "계속 항해한다.", next: 'mid_ocean' }
            ]
        },
        'mid_ocean': {
            speaker: '항해사',
            text: "선장님, 바다에 나온 지 두 달이 넘었습니다. 괴혈병이 돌고 식량이 썩고 있습니다. 선원들이 '지구 끝 낭떠러지'로 떨어질까 봐 폭동을 일으키려 합니다!",
            action: () => { moveShip(30, 45); updateStats(40, 40, 30); },
            choices: [
                { text: "무력으로 진압하고 강행한다", next: 'arrive_america' },
                { text: "황금이 기다린다며 선원들을 설득한다", next: 'arrive_america' }
            ]
        },
        'arrive_america': {
            speaker: '시스템 (개념 설명)',
            text: "[이동 집단]<br><br>마침내 육지입니다! 콜럼버스는 이곳을 인도라 착각했죠.<br>초기 이곳에 온 집단은 코르테스나 피사로 같은 '정복자(콘키스타도르)'였습니다. 이들은 황금을 위해 아스텍과 잉카 문명을 무너뜨렸습니다. 이후 가톨릭 선교사들과, 자유를 찾는 청교도 정착민들이 합류했습니다.",
            action: () => { moveShip(15, 45); updateStats(60, 80, 100); },
            choices: [
                { text: "원주민 노동력이 부족해지면 어떻게 됩니까?", next: 'triangular_trade' }
            ]
        },
        'triangular_trade': {
            speaker: '시스템 (개념 설명)',
            text: "[이동 과정의 특성 - 삼각 무역]<br><br>매우 잔혹한 역사가 시작됩니다. 광산과 대농장(플랜테이션)의 노동력이 부족해지자, 유럽인들은 아프리카 흑인들을 노예로 사냥하여 신대륙으로 '강제 이주' 시켰습니다.<br>유럽(무기/직물) → 아프리카(노예) → 아메리카(설탕/담배/은)로 이어지는 끔찍한 '삼각 무역망'이 완성된 것입니다.",
            action: () => moveShip(35, 60), // 대서양 중앙으로 이동
            choices: [
                { text: "이 이주가 세계에 어떤 영향을 미쳤는가?", next: 'exchange_positive' }
            ]
        },
        'exchange_positive': {
            speaker: '학자',
            text: "[이동 결과 - 콜럼버스의 교환 (명과 암)]<br><br>이 거대한 이동은 '지구촌'의 토대가 되었습니다. 아메리카의 구황작물(감자, 옥수수)이 유럽과 아시아로 넘어가 인류를 굶주림에서 구했고, 막대한 은이 유입되며 유럽에 '가격 혁명'과 상업 발전이 일어났습니다.",
            action: () => { moveShip(60, 40); updateStats(80, 100, 100); },
            choices: [
                { text: "부정적인 결과는 없었는가?", next: 'exchange_negative' }
            ]
        },
        'exchange_negative': {
            speaker: '학자',
            text: "물론 있습니다. 유럽인들이 가져온 눈에 보이지 않는 균(천연두, 홍역 등) 때문에 면역력이 없던 아메리카 원주민 인구의 90% 이상이 사망했습니다. 찬란했던 고유 문명은 파괴되었고, 유럽 문화가 그 자리를 강제로 대체했습니다.",
            choices: [
                { text: "발표의 결론으로 넘어간다.", next: 'ending' }
            ]
        },
        'ending': {
            speaker: '발표자 (선장)',
            text: "[결론]<br><br>신대륙 발견과 이주의 시대는 폭력과 희생이 뒤섞인 비극적인 역사이기도 합니다. 하지만 이 과정에서 경제, 식생, 인종, 문화가 대륙을 넘어 교류하게 되었고, 마침내 오늘날 우리가 아는 긴밀히 연결된 거대한 '지구촌'이 탄생하게 되었습니다.<br><br>이상으로 게임형 발표를 마칩니다. 감사합니다!",
            action: () => updateStats(100, 100, 100),
            choices: [
                { text: "처음으로 돌아가기", next: 'intro' }
            ]
        }
    };

</script>
</body>
</html>
